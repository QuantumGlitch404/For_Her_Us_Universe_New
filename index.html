    <style>
      /* Reset & Global Settings */
      body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%;
        height: 100%;
        background-color: #0f0518; /* Deep purple/black background only on body */
        overflow: hidden;
        cursor: none !important; /* Hide default cursor */
      }

      /* Ensure cursor is hidden on all interactive elements */
      a, button, input, div, span, * {
        cursor: none !important;
      }

      /* Custom Font Classes */
      .font-hand { font-family: 'Dancing Script', cursive; }
      .font-serif-elegant { font-family: 'Playfair Display', serif; }
      .font-soft { font-family: 'Quicksand', sans-serif; }
      
      /* Animation Utilities */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
    <script>
      // Comprehensive Polyfills for browser compatibility
      window.process = { 
        env: { NODE_ENV: 'production' },
        version: '',
        nextTick: (cb) => setTimeout(cb, 0)
      };
      window.global = window;
    </script>
    <!-- Buffer Polyfill from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
    <script>
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = buffer.Buffer;
      }
    </script>
